<p-dialog
  [visible]="showDialog()"
  (visibleChange)="showDialog.set($event)"
  header="Neue Aufgabe erstellen"
  [modal]="true"
  [closable]="true">

  <form (ngSubmit)="onSubmit()">
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <div class="input-row">
        <label for="title" style="display: block; margin-bottom: 0.5rem;">Name:</label>
        <pInputText
          id="title"
          [ngModel]="formData().title"
          (ngModelChange)="updateFormData('title', $event)"
          name="name">
        </pInputText>
      </div>
      <div class="input-row">
        <label for="status" style="display: block; margin-bottom: 0.5rem;">Status:</label>
        <p-select
          id="status"
          [options]="items"
          optionLabel="label"
          optionValue="value"
          [ngModel]="formData().status"
          (ngModelChange)="updateFormData('status', $event)"
          name="status"
          placeholder="Status wählen">
        </p-select>
      </div>
      <div class="input-row">
        <label for="deadline" style="display: block; margin-bottom: 0.5rem;">Deadline:</label>
        <p-datepicker
          [(ngModel)]="date"
          (ngModelChange)="updateFormData('deadline', $event)">

        </p-datepicker>
      </div>
      <div class="input-row">
        <label for="estimatedTime" style="display: block; margin-bottom: 0.5rem;">Geschätzte Zeit (h):</label>
        <pInputText
          id="estimatedTime"
          [ngModel]="formData().estimatedTime"
          (ngModelChange)="updateFormData('estimatedTime', $event)"
          name="estimatedTime"
          mode="decimal"
          placeholder="z.B. 3">
        </pInputText>
      </div>
      <div class="input-row">
        <label for="trackedTime" style="display: block; margin-bottom: 0.5rem;">Erfasste Zeit (h):</label>
        <pInputText
          id="trackedTime"
          [ngModel]="formData().trackedTime"
          (ngModelChange)="updateFormData('trackedTime', $event)"
          name="trackedTime"
          mode="decimal"
          placeholder="z.B. 2">
        </pInputText>
      </div>
      <div class="input-row">
        <p-floatlabel>
          <p-inputtextarea
            pInputTextarea
            id="description"
            [ngModel]="formData().description"
            (ngModelChange)="updateFormData('description', $event)"
            name="description">
          </p-inputtextarea>
          <label for="description">Beschreibung</label>
        </p-floatlabel>
      </div>

      <hr>

      <div>

      </div>


      <hr>

      <div style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem;">
        <p-button
          label="Abbrechen"
          severity="secondary"
          (click)="showDialog.set(false)">
        </p-button>
        <p-button
          label="Speichern"
          type="submit"
          severity="success">
        </p-button>
      </div>
    </div>
  </form>
</p-dialog>
