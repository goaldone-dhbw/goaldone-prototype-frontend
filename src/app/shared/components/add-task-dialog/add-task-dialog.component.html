<p-dialog
  [visible]="showDialog()"
  (visibleChange)="showDialog.set($event)"
  header="Aufgabe hinzufügen"
  [modal]="true"
  [style]="{ width: '60rem' }"
  [closable]="false">

  <form (ngSubmit)="onSubmit()">
    <p-card class="form-grid">
      <div class="general">
        <div class="input-row">
          <label>Titel:</label>
          <input
            pInputText
            id="title"
            [ngModel]="formData().title"
            (ngModelChange)="updateFormData('title', $event)"
            name="title">
        </div>

        <div class="input-row">
          <label>Status:</label>
          <p-select
            id="status"
            [options]="taskStates"
            optionLabel="label"
            optionValue="value"
            [ngModel]="formData().status"
            (ngModelChange)="updateFormData('status', $event)"
            name="status"
            placeholder="Status wählen">
          </p-select>
        </div>

        <div class="input-row">
          <label>Frist:</label>
          <p-datepicker
            id="deadline"
            [showTime]="true"
            [ngModel]="formData().deadline"
            (ngModelChange)="updateFormData('deadline', $event)"
            name="deadline">
          </p-datepicker>
        </div>

        <div class="input-row">
          <label>Kognitiver Anspruch:</label>
          <p-select
            id="difficulty"
            [options]="taskDifficulty"
            optionLabel="label"
            optionValue="value"
            [ngModel]="formData().difficulty"
            (ngModelChange)="updateFormData('difficulty', $event)"
            name="difficulty"
            placeholder="Schwierigkeit wählen">
          </p-select>
        </div>

        <div class="input-row">
          <label>Geschätzte Zeit:</label>
          <p-inputnumber
            id="estimatedTime"
            [ngModel]="formData().estimatedTime"
            (ngModelChange)="updateFormData('estimatedTime', $event)"
            name="estimatedTime">
          </p-inputnumber>
        </div>

        <div class="input-row full-width">
          <label>Beschreibung:</label>
          <textarea
            pTextarea
            rows="3"
            id="description"
            [ngModel]="formData().description"
            (ngModelChange)="updateFormData('description', $event)"
            name="description">
        </textarea>
        </div>
      </div>

      <br>
      <hr>
      <br>
      <div class="schedule">
        <div class="input-row">
          <label>Nicht planen vor:</label>
          <br>
          <p-datepicker
            [showClear]="true"
            id="scheduleStartDate"
            [showTime]="true"
            [ngModel]="formData().scheduleStartDate"
            (ngModelChange)="updateFormData('scheduleStartDate', $event)"
            name="scheduleStartDate">
          </p-datepicker>
        </div>
      </div>

      <br>
      <hr>
      <br>

      <div class="schedule">

        <div class="input-row">
          <label>Wiederkehrende Aufgaben:</label>
          <br>
          <p-select
            [options]="recurrenceTypes"
            optionLabel="label"
            optionValue="value"
            [ngModel]="formData().recurrence?.type"
            (ngModelChange)="updateRecurrence('type', $event)">
          </p-select>
        </div>
      </div>

      <br>
      <hr>
      <br>


      <div>
        <p-checkbox
          [ngModel]="formData().recurring"
          (ngModelChange)="updateFormData('recurring', $event)"
          binary="true"
          variant="filled"
          name="recurring">
        </p-checkbox>
        <label> Recurring Task</label>
      </div>

      @if (formData().recurring) {
        <div class="recurring">

          <div class="input-row">
            <label>Wiederholung:</label>
            <p-select
              [options]="recurringOptions"
              optionLabel="label"
              optionValue="value"
              [ngModel]="formData().recurrenceType"
              (ngModelChange)="updateFormData('recurrenceType', $event)"
              name="recurringType"
              placeholder="Wiederholung wählen">
            </p-select>
          </div>

          <div class="input-row">
            <label>Intervall:</label>
            <p-inputnumber
              [ngModel]="formData().recurrenceIntervall"
              (ngModelChange)="updateFormData('recurrenceIntervall', $event)"
              name="recurringInterval">
            </p-inputnumber>
          </div>

        </div>
      }

      <br>
      <hr>
      <br>

      <div class="chunk">

        <!-- Bis jetzt noch nicht implementiert im Backend -->
        <div class="input-row full-width">
          <p-button
            label="Arbeitspaket hinzufügen"
            icon="pi pi-plus"
            (click)="addChunk()">
          </p-button>
        </div>

        <div class="input-row full-width">
          <div class="chunk-list">

            @for (c of formData().chunks; track $index; let i = $index) {
              <div class="chunk-item">
                <label>{{ i + 1 }}.</label>

                <input
                  pInputText
                  [ngModel]="c"
                  (ngModelChange)="updateChunk(i, $event)"
                  [class.ng-invalid]="!isValidTime(c) && c"
                  placeholder="hh:mm"
                  name="chunk{{i}}">

                <p-button
                  icon="pi pi-trash"
                  severity="danger"
                  (click)="removeChunk(i)">
                </p-button>
              </div>
            }

          </div>
        </div>

      </div>

      <br>
      <hr>
      <br>

      <div class="button-row full-width">
        <p-button label="Abbrechen" (click)="showDialog.set(false)"></p-button>
        <p-button label="Speichern" type="submit" severity="success"></p-button>
      </div>
    </p-card>
  </form>
</p-dialog>
