<p-dialog
  [visible]="showDialog()"
  (visibleChange)="showDialog.set($event)"
  header="Neue Aufgabe erstellen"
  [modal]="true"
  [closable]="true">

  <form (ngSubmit)="onSubmit()">
    <div class="form-grid">

      <div class="input-row">
        <label>Name:</label>
        <pInputText
          id="title"
          [ngModel]="formData().title"
          (ngModelChange)="updateFormData('title', $event)"
          name="title">
        </pInputText>
      </div>

      <div class="input-row">
        <label>Status:</label>
        <p-select
          id="status"
          [options]="items"
          optionLabel="label"
          optionValue="value"
          [ngModel]="formData().status"
          (ngModelChange)="updateFormData('status', $event)"
          name="status"
          placeholder="Status wählen">
        </p-select>
      </div>

      <div class="input-row">
        <label>Deadline:</label>
        <p-datepicker
          [ngModel]="formData().deadline"
          (ngModelChange)="updateFormData('deadline', $event)">
        </p-datepicker>
      </div>

      <div class="input-row">
        <label>Geschätzte Zeit:</label>
        <p-inputnumber
          id="estimatedTime"
          [ngModel]="formData().estimatedTime"
          (ngModelChange)="updateFormData('estimatedTime', $event)">
        </p-inputnumber>
      </div>

      <div class="input-row">
        <label>Erfasste Zeit:</label>
        <p-inputnumber
          [ngModel]="formData().trackedTime"
          (ngModelChange)="updateFormData('trackedTime', $event)">
        </p-inputnumber>
      </div>

      <div class="input-row full-width">
        <p-floatlabel>
          <p-textarea
            id="description"
            [ngModel]="formData().description"
            (ngModelChange)="updateFormData('description', $event)"
            name="description">
          </p-textarea>
          <label>Beschreibung</label>
        </p-floatlabel>
      </div>

      <hr class="full-width">

      <!-- Schedule -->
      <div class="input-row full-width">
        <p-checkbox
          [ngModel]="formData().scheduleTask"
          (ngModelChange)="updateFormData('scheduleTask', $event)"
          binary="true"
          label="Schedule Task">
        </p-checkbox>
      </div>

      <div class="input-row">
        <label>Start:</label>
        <p-datepicker
          [ngModel]="formData().start"
          (ngModelChange)="updateFormData('start', $event)"
          [disabled]="formData().scheduleTask">
        </p-datepicker>
      </div>

      <div class="input-row">
        <label>Ende:</label>
        <p-datepicker
          [ngModel]="formData().end"
          (ngModelChange)="updateFormData('end', $event)"
          [disabled]="formData().scheduleTask">
        </p-datepicker>
      </div>

      <hr class="full-width">

      <!-- Chunk -->
      <div class="input-row" *ngIf="formData().chunked">
        <label>Anzahl:</label>
        <p-inputnumber
          [ngModel]="formData().numChunks"
          (ngModelChange)="updateFormData('numChunks', $event)">
        </p-inputnumber>
      </div>

      <div class="input-row full-width" *ngIf="formData().chunked">
        <div class="chunk-list">
          <div *ngFor="let c of formData().chunkDurations; let i = index" class="chunk-item">
            <label>{{ i + 1 }}.</label>
            <input
              type="text"
              [ngModel]="c"
              (ngModelChange)="updateChunk(i, $event)"
              placeholder="hh:mm">
          </div>
        </div>
      </div>

      <hr class="full-width">

      <div class="button-row full-width">
        <p-button label="Abbrechen" (click)="showDialog.set(false)"></p-button>
        <p-button label="Speichern" type="submit" severity="success"></p-button>
      </div>

    </div>
  </form>
</p-dialog>
