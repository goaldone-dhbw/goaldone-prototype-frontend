<p-dialog
  [visible]="showDialog()"
  (visibleChange)="showDialog.set($event)"
  header="Aufgabe bearbeiten"
  [modal]="true"
  [style]="{ width: '60rem' }"
  [closable]="false">

  <form (ngSubmit)="onSubmit()">
    <p-card class="form-grid">
      <div class="general">
        <div class="input-row">
          <label>Name:</label>
          <input
            pInputText
            id="title"
            [ngModel]="formData().title"
            (ngModelChange)="updateFormData('title', $event)"
            name="title">
        </div>

        <div class="input-row">
          <label>Status:</label>
          <p-select
            id="status"
            [options]="taskStates"
            optionLabel="label"
            optionValue="value"
            [ngModel]="formData().status"
            (ngModelChange)="updateFormData('status', $event)"
            name="status"
            placeholder="Status wählen">
          </p-select>
        </div>

        <div class="input-row">
          <label>Deadline:</label>
          <p-datepicker
            id="deadline"
            [showTime]="true"
            [ngModel]="formData().deadline"
            (ngModelChange)="updateFormData('deadline', $event)"
            name="deadline">
          </p-datepicker>
        </div>

        <div class="input-row">
          <label>Kognitiver Anspruch</label>
          <p-select
            id="difficulty"
            [options]="taskDifficulty"
            optionLabel="label"
            optionValue="value"
            [ngModel]="formData().difficulty"
            (ngModelChange)="updateFormData('difficulty', $event)"
            name="difficulty"
            placeholder="Schwierigkeit wählen">
          </p-select>
        </div>

        <div class="input-row">
          <label>Geschätzte Zeit:</label>
          <p-inputnumber
            id="estimatedTime"
            [ngModel]="formData().estimatedTime"
            (ngModelChange)="updateFormData('estimatedTime', $event)"
            name="estimatedTime">
          </p-inputnumber>
        </div>

        <div class="input-row">
          <label>Erfasste Zeit:</label>
          <p-inputnumber
            id="trackedTime"
            [ngModel]="formData().trackedTime"
            (ngModelChange)="updateFormData('trackedTime', $event)"
            name="trackedTime">
          </p-inputnumber>
        </div>

        <div class="input-row full-width">
          <label>Beschreibung</label>
          <textarea
            pTextarea
            rows="3"
            id="description"
            [ngModel]="formData().description"
            (ngModelChange)="updateFormData('description', $event)"
            name="description">
        </textarea>
        </div>
      </div>


      <br>
      <hr>
      <br>

      <div>
        <p-checkbox
          [ngModel]="formData().scheduleTask"
          (ngModelChange)="updateFormData('scheduleTask', $event)"
          binary="true"
          variant="filled"
          name="scheduleTask">
        </p-checkbox>
        <label>  Schedule Task</label>
      </div>

      <br>

      <div class="schedule">
        <div class="input-row">
          <label>Start:</label>
          <p-datepicker
            id="startDate"
            [showTime]="true"
            [ngModel]="formData().startDate"
            (ngModelChange)="updateFormData('startDate', $event)"
            [disabled]="formData().scheduleTask"
            name="startDate">
          </p-datepicker>
        </div>

        <div class="input-row">
          <label>Ende:</label>
          <p-datepicker
            id="endDate"
            [showTime]="true"
            [ngModel]="formData().endDate"
            (ngModelChange)="updateFormData('endDate', $event)"
            [disabled]="formData().scheduleTask"
            name="endDate">
          </p-datepicker>
        </div>
      </div>

      <br>
      <hr>
      <br>

      <div class="chunk">
        <div class="input-row">
          <label>Anzahl Chunks:</label>
          <p-inputnumber
            id="numChunks"
            [ngModel]="formData().numChunks"
            (ngModelChange)="updateFormData('numChunks', $event)"
            name="numChunks">
          </p-inputnumber>
        </div>

        @if (formData().numChunks) {
          <div class="input-row full-width">
            <div class="chunk-list">

              @if (formData().chunks.length >= 2) {
                @for (c of formData().chunks; track $index; let i = $index) {
                  <div class="chunk-item">
                    <label>{{ i + 1 }}.</label>

                    <p-inputnumber
                      type="text"
                      [ngModel]="c"
                      (input)="updateChunk(i, $any($event.target).value)"
                      placeholder="hh:mm"
                      name="chunk{{i}}">
                    </p-inputnumber>
                  </div>
                }
              }
            </div>
          </div>
        }
      </div>

      <br>
      <hr>
      <br>

      <div class="button-row full-width">
        <p-button label="Abbrechen" (click)="showDialog.set(false)"></p-button>
        <p-button label="Speichern" type="submit" severity="success"></p-button>
      </div>
    </p-card>
  </form>
</p-dialog>
