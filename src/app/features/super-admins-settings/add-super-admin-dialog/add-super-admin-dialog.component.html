<app-base-dialog
    [visible]="visible"
    (visibleChange)="visibleChange.emit($event)"
    [header]="invitationResult() ? 'Einladung versendet' : 'Super-Admin hinzufügen'"
    [actionLabel]="invitationResult() ? 'Schließen' : 'Hinzufügen'"
    [actionDisabled]="!invitationResult() && form.invalid"
    [loading]="loading()"
    [errorMessage]="errorMessage()"
    (confirm)="invitationResult() ? close() : submit()"
    (close)="close()"
>
    <div *ngIf="invitationResult(); else inviteForm" class="flex flex-column gap-3">
        <p>
            Einladung wurde an <strong>{{ invitationResult()?.email }}</strong> versendet. 
            Der Link ist gültig bis <strong>{{ formatDateTime(invitationResult()?.expiresAt) }}</strong>.
        </p>
    </div>

    <ng-template #inviteForm>
        <form [formGroup]="form" class="flex flex-column gap-3">
            <p>
                Die eingeladene Person erhält eine E-Mail mit einem Registrierungslink. 
                Kein bestehender Account erforderlich.
            </p>
            <div class="flex flex-column gap-2">
                <label for="adminEmail">E-Mail des Nutzers</label>
                <input pInputText id="adminEmail" formControlName="email" placeholder="user@example.com" />
                <p-message
                    *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['required']"
                    severity="error"
                    variant="simple"
                    size="small"
                    text="E-Mail ist erforderlich."
                ></p-message>
                <p-message
                    *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']"
                    severity="error"
                    variant="simple"
                    size="small"
                    text="Bitte eine gültige E-Mail-Adresse eingeben."
                ></p-message>
            </div>
        </form>
    </ng-template>
</app-base-dialog>
