<app-base-dialog
    [(visible)]="visible"
    header="Account löschen"
    actionLabel="Account endgültig löschen"
    actionSeverity="danger"
    [loading]="loading()"
    [actionDisabled]="confirmationText() !== 'LÖSCHEN'"
    [errorMessage]="errorMessage()"
    (confirm)="deleteAccount()"
    (close)="close()">

    <div class="info-container">
        <p>Möchten Sie Ihren Account wirklich löschen?</p>
        <p class="warning-text">Diese Aktion ist unwiderruflich. Alle Ihre persönlichen Daten werden sofort gelöscht.</p>
    </div>

    <div class="field-container">
        <label for="confirmationTextAccount">Zur Bestätigung "LÖSCHEN" eingeben</label>
        <input
            id="confirmationTextAccount"
            pInputText
            [(ngModel)]="confirmationText"
            name="confirmation"
            placeholder="LÖSCHEN"
            class="full-width" />
    </div>
</app-base-dialog>
