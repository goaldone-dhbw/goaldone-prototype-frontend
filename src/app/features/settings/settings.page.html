<p-toast key="settings-toast" />

<div class="settings-page">
    <h1>Einstellungen</h1>

    <div class="settings-grid">
        <p-card header="Account">
            <div class="account-section">
                <div class="user-info">
                    <p class="user-name">{{ userProfile()?.firstName }} {{ userProfile()?.lastName }}</p>
                    <p class="user-email">{{ userProfile()?.email }}</p>
                </div>

                <div class="account-actions">
                    <p-button
                        label="Passwort ändern"
                        icon="pi pi-lock"
                        (onClick)="showPasswordDialog.set(true)"
                        styleClass="action-button" />

                    <p-divider />

                    <p-button
                        label="Abmelden"
                        icon="pi pi-sign-out"
                        (onClick)="logout()"
                        styleClass="p-button-alarm action-button"
                        severity="danger"
                    />

                    <p-divider />

                    <p-button
                        label="Account löschen"
                        icon="pi pi-trash"
                        (onClick)="showDeleteAccountDialog.set(true)"
                        styleClass="p-button-alarm action-button"
                        severity="danger"
                        [text]="true"
                    />
                </div>
            </div>
        </p-card>
    </div>
</div>

<app-change-password-dialog
    [visible]="showPasswordDialog()"
    (visibleChange)="showPasswordDialog.set($event)" />

<app-delete-account-dialog
    [visible]="showDeleteAccountDialog()"
    (visibleChange)="showDeleteAccountDialog.set($event)" />
