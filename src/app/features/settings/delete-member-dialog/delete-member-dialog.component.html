<p-dialog
    [(visible)]="visible"
    [modal]="true"
    header="Mitglied entfernen"
    [closable]="true"
    (onHide)="close()"
    styleClass="delete-member-dialog">

    <div class="dialog-content">
        <div class="info-container">
            <p>Möchten Sie das Mitglied <strong>{{ member()?.email }}</strong> wirklich aus der Organisation entfernen?</p>
            <p class="warning-text">Diese Aktion ist unwiderruflich. Der Nutzer verliert sofortigen Zugriff auf alle Daten.</p>
        </div>

        <div class="field-container">
            <label for="confirmationTextMember">Zur Bestätigung "LÖSCHEN" eingeben</label>
            <input
                id="confirmationTextMember"
                pInputText
                [(ngModel)]="confirmationText"
                placeholder="LÖSCHEN"
                class="full-width" />
        </div>

        @if (errorMessage()) {
            <p-message severity="error" styleClass="full-width">{{ errorMessage() }}</p-message>
        }
    </div>

    <ng-template pTemplate="footer">
        <p-button
            label="Abbrechen"
            [text]="true"
            (onClick)="close()"
            [disabled]="loading()" />
        <p-button
            label="Mitglied endgültig löschen"
            severity="danger"
            (onClick)="deleteMember()"
            [loading]="loading()"
            [disabled]="confirmationText() !== 'LÖSCHEN'" />
    </ng-template>
</p-dialog>
