<p-dialog
    [(visible)]="visible"
    [modal]="true"
    header="Passwort ändern"
    [closable]="true"
    (onHide)="close()"
    styleClass="change-password-dialog">

    <form (ngSubmit)="save()">
        <div class="dialog-content">
            <div class="field-container">
                <label for="currentPassword">Aktuelles Passwort</label>
                <p-password
                    id="currentPassword"
                    name="currentPassword"
                    [ngModel]="currentPassword()"
                    (ngModelChange)="currentPassword.set($event)"
                    [feedback]="false"
                    [toggleMask]="true"
                    inputStyleClass="full-width" />
            </div>

            <div class="field-container">
                <label for="newPassword">Neues Passwort</label>
                <p-password
                    id="newPassword"
                    name="newPassword"
                    [ngModel]="newPassword()"
                    (ngModelChange)="newPassword.set($event)"
                    [feedback]="true"
                    [toggleMask]="true"
                    promptLabel="Neues Passwort wählen"
                    weakLabel="Schwach"
                    mediumLabel="Mittel"
                    strongLabel="Stark"
                    inputStyleClass="full-width" />
                <small class="hint">Mindestens 8 Zeichen</small>
            </div>

            @if (errorMessage()) {
                <p-message severity="error" styleClass="full-width">{{ errorMessage() }}</p-message>
            }
        </div>

        <div class="p-dialog-footer">
            <p-button
                label="Abbrechen"
                [text]="true"
                type="button"
                (onClick)="close()"
                [disabled]="loading()" />
            <p-button
                label="Speichern"
                icon="pi pi-check"
                type="submit"
                [loading]="loading()" />
        </div>
    </form>
</p-dialog>
