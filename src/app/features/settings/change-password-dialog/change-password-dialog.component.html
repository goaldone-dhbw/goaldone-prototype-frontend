<p-dialog
    [(visible)]="visible"
    [modal]="true"
    header="Passwort ändern"
    [closable]="true"
    (onHide)="close()"
    styleClass="change-password-dialog">

    <div class="dialog-content">
        <div class="field-container">
            <label for="currentPassword">Aktuelles Passwort</label>
            <p-password
                id="currentPassword"
                [(ngModel)]="currentPassword"
                [feedback]="false"
                [toggleMask]="true"
                inputStyleClass="full-width" />
        </div>

        <div class="field-container">
            <label for="newPassword">Neues Passwort</label>
            <p-password
                id="newPassword"
                [(ngModel)]="newPassword"
                [feedback]="true"
                [toggleMask]="true"
                promptLabel="Neues Passwort wählen"
                weakLabel="Schwach"
                mediumLabel="Mittel"
                strongLabel="Stark"
                inputStyleClass="full-width" />
            <small class="hint">Mindestens 8 Zeichen</small>
        </div>

        @if (errorMessage()) {
            <p-message severity="error" styleClass="full-width">{{ errorMessage() }}</p-message>
        }
    </div>

    <ng-template pTemplate="footer">
        <p-button
            label="Abbrechen"
            [text]="true"
            (onClick)="close()"
            [disabled]="loading()" />
        <p-button
            label="Speichern"
            icon="pi pi-check"
            (onClick)="save()"
            [loading]="loading()" />
    </ng-template>
</p-dialog>
